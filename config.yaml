# Which days & times to watch (times are German local time, Europe/Berlin).
#
# days:  weekday names (Mon Tue Wed Thu Fri Sat Sun — German Mo Di Mi Do Fr Sa So
#        also work) and/or exact dates like 2026-07-25
# start/end: a slot is reported when it lies fully inside this window
#
# EDIT THIS to your preferred times:
watches:
  - days: [Sat, Sun]
    start: "10:00"
    end: "18:00"
  - days: [Mon, Tue, Wed, Thu, Fri]
    start: "17:00"
    end: "21:00"

# Which courts to watch. Empty list = all courts.
# Use court numbers, e.g. [2, 5, 7], or name fragments like ["Kunststoff"].
courts: []

# How many days ahead to check (booking opens 7 days in advance).
days_ahead: 8
