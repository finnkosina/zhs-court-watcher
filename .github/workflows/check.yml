name: Check ZHS courts

on:
  schedule:
    # Fires every 5 min (GitHub's minimum). Each job loops internally for up
    # to ~70 min checking every 60 s; the concurrency group below makes sure
    # only one job runs at a time and the next queued one takes over
    # seamlessly when it exits — giving continuous 1-minute coverage.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: zhs-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore state (session cookie + watches)
        uses: actions/cache/restore@v4
        with:
          path: state
          key: zhs-state-${{ github.run_id }}
          restore-keys: zhs-state-

      - run: pip install -r requirements.txt

      - name: Run watcher loop
        env:
          TUM_USER: ${{ secrets.TUM_USER }}
          TUM_PASS: ${{ secrets.TUM_PASS }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python checker.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: zhs-state-${{ github.run_id }}
