name: Check ZHS courts

on:
  schedule:
    # Backup watchdog only: each job re-triggers its successor itself (last
    # step below), so handover is instant. GitHub cron is unreliable
    # (often 10-30 min late) and merely restarts the chain if it ever breaks.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

concurrency:
  group: zhs-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore state (session cookie + watches)
        uses: actions/cache/restore@v4
        with:
          path: state
          key: zhs-state-${{ github.run_id }}
          restore-keys: zhs-state-

      - run: pip install -r requirements.txt

      - name: Run watcher loop
        env:
          TUM_USER: ${{ secrets.TUM_USER }}
          TUM_PASS: ${{ secrets.TUM_PASS }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PYTHONUNBUFFERED: "1"
        run: python checker.py

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: zhs-state-${{ github.run_id }}

      - name: Trigger next run (self-sustaining chain)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run check.yml --ref main --repo "$GITHUB_REPOSITORY"
